name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm run test:run

      - name: Build release tarball
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p release-staging/norrath-native

          # Runtime files only (no dev tools, tests, or source)
          cp -r scripts/ release-staging/norrath-native/
          cp -r dist/ release-staging/norrath-native/
          cp -r helpers/ release-staging/norrath-native/
          cp -r layouts/ release-staging/norrath-native/
          cp norrath-native.example.yaml release-staging/norrath-native/
          cp Makefile release-staging/norrath-native/
          cp package.json pnpm-lock.yaml release-staging/norrath-native/
          cp README.md LICENSE CHANGELOG.md release-staging/norrath-native/
          cp AGENTS.md CLAUDE.md release-staging/norrath-native/
          cp CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md release-staging/norrath-native/
          cp .nvmrc .editorconfig release-staging/norrath-native/

          # Create tarball
          tar -czf "norrath-native-${TAG}.tar.gz" -C release-staging norrath-native
          echo "tarball=norrath-native-${TAG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: |
            ## norrath-native ${{ github.ref_name }}

            Deterministic EverQuest deployment toolkit for Ubuntu 24.04 LTS.

            ### Quick Start
            ```bash
            # Download and extract
            tar xzf norrath-native-${{ github.ref_name }}.tar.gz
            cd norrath-native
            make prereqs && make install && make deploy
            make launch
            ```

            ### What's Included
            - Pre-compiled TypeScript CLI (`dist/`)
            - Pre-compiled Wine helper (`helpers/wine_helper.exe`)
            - All scripts, layout templates, and Makefile
            - No dev dependencies (tests, source, build configs excluded)

            ### Full Changelog
            See [CHANGELOG.md](https://github.com/williamzujkowski/norrath-native/blob/main/CHANGELOG.md)
          files: norrath-native-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
