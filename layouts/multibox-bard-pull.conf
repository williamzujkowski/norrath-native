# multibox-bard-pull.conf — Bard puller (main) + SK + BER layout
#
# ┌──────────────────────┬───────────┐
# │                      │    SK     │
# │   Bard (Main)        │  (box 1)  │
# │   ~65% width         ├───────────┤
# │                      │    BER    │
# │                      │  (box 2)  │
# └──────────────────────┴───────────┘
#
# The bard gets the large window for pulling/navigation.
# SK and BER are stacked on the right for quick glance + click.

# Layout name and description
LAYOUT_NAME="Multibox Bard Pull"
LAYOUT_DESC="Bard puller (large left), SK + BER (stacked right)"
LAYOUT_INSTANCES=3

# Wine desktop tiling (percentage of screen)
# Format: TILE_N_X TILE_N_Y TILE_N_W TILE_N_H (percentages 0-100)
TILE_1_X=0    TILE_1_Y=0    TILE_1_W=65   TILE_1_H=100   # Bard (main)
TILE_2_X=65   TILE_2_Y=0    TILE_2_W=35   TILE_2_H=50    # SK
TILE_3_X=65   TILE_3_Y=50   TILE_3_W=35   TILE_3_H=50    # BER

# EQ internal UI positions (percentage within each EQ window)
# These define where chat, target, hotbar etc. go INSIDE each EQ instance
# Applied to the character's UI_charname_server.ini

# Main character (bard) — full UI with all windows visible
MAIN_CHAT_X=0     MAIN_CHAT_Y=75    MAIN_CHAT_W=35    MAIN_CHAT_H=25
MAIN_TARGET_X=40  MAIN_TARGET_Y=0   MAIN_TARGET_W=20  MAIN_TARGET_H=8
MAIN_PLAYER_X=85  MAIN_PLAYER_Y=35  MAIN_PLAYER_W=15  MAIN_PLAYER_H=10
MAIN_GROUP_X=85   MAIN_GROUP_Y=45   MAIN_GROUP_W=15   MAIN_GROUP_H=25
MAIN_HOTBAR_X=0   MAIN_HOTBAR_Y=95  MAIN_HOTBAR_W=50  MAIN_HOTBAR_H=5
MAIN_BUFFS_X=85   MAIN_BUFFS_Y=0    MAIN_BUFFS_W=15   MAIN_BUFFS_H=20

# Box characters (SK, BER) — compact UI, essentials only
BOX_CHAT_X=0      BOX_CHAT_Y=80     BOX_CHAT_W=100    BOX_CHAT_H=20
BOX_TARGET_X=30   BOX_TARGET_Y=0    BOX_TARGET_W=40    BOX_TARGET_H=10
BOX_PLAYER_X=0    BOX_PLAYER_Y=0    BOX_PLAYER_W=30    BOX_PLAYER_H=12
BOX_GROUP_X=70    BOX_GROUP_Y=0     BOX_GROUP_W=30     BOX_GROUP_H=30
BOX_HOTBAR_X=0    BOX_HOTBAR_Y=90   BOX_HOTBAR_W=70    BOX_HOTBAR_H=10

# Viewport (for ultrawide monitors)
# auto = calculate 16:9 centered viewport
# none = no viewport adjustment
VIEWPORT_MODE=auto
