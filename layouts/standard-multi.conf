# standard-multi.conf — Equal tiling for 3 clients
#
# ┌───────────┬───────────┐
# │           │           │
# │  Char 1   │  Char 2   │
# │           │           │
# ├───────────┴───────────┤
# │       Char 3          │
# │    (bottom row)       │
# └───────────────────────┘
#
# Or for 2 clients: side by side 50/50
# Or for 4 clients: 2x2 grid

LAYOUT_NAME="Standard Multi"
LAYOUT_DESC="Equal tiling for 2-4 clients"
LAYOUT_INSTANCES=3

# 3-window layout (2 top, 1 bottom)
TILE_1_X=0    TILE_1_Y=0    TILE_1_W=50   TILE_1_H=50
TILE_2_X=50   TILE_2_Y=0    TILE_2_W=50   TILE_2_H=50
TILE_3_X=0    TILE_3_Y=50   TILE_3_W=100  TILE_3_H=50

# Compact UI for all instances (same layout, smaller)
MAIN_CHAT_X=0     MAIN_CHAT_Y=80    MAIN_CHAT_W=100   MAIN_CHAT_H=20
MAIN_TARGET_X=30  MAIN_TARGET_Y=0   MAIN_TARGET_W=40   MAIN_TARGET_H=10
MAIN_PLAYER_X=0   MAIN_PLAYER_Y=0   MAIN_PLAYER_W=25   MAIN_PLAYER_H=12
MAIN_GROUP_X=75   MAIN_GROUP_Y=0    MAIN_GROUP_W=25    MAIN_GROUP_H=30
MAIN_HOTBAR_X=0   MAIN_HOTBAR_Y=90  MAIN_HOTBAR_W=75   MAIN_HOTBAR_H=10

BOX_CHAT_X=0      BOX_CHAT_Y=80     BOX_CHAT_W=100    BOX_CHAT_H=20
BOX_TARGET_X=30   BOX_TARGET_Y=0    BOX_TARGET_W=40    BOX_TARGET_H=10
BOX_PLAYER_X=0    BOX_PLAYER_Y=0    BOX_PLAYER_W=25    BOX_PLAYER_H=12
BOX_GROUP_X=75    BOX_GROUP_Y=0     BOX_GROUP_W=25     BOX_GROUP_H=30
BOX_HOTBAR_X=0    BOX_HOTBAR_Y=90   BOX_HOTBAR_W=75    BOX_HOTBAR_H=10

VIEWPORT_MODE=auto
