# raid-solo.conf — Single client raid layout with utilities sidebar
#
# ┌──────────────────────┬───────────┐
# │                      │ EQLogPrs  │
# │   EverQuest          │ (DPS/trig)│
# │   Main Character     ├───────────┤
# │   ~70% width         │ Maps /    │
# │                      │ Notes     │
# │                      │           │
# └──────────────────────┴───────────┘
#
# Main EQ window takes 70% of screen. Right 30% is for:
# - EQLogParser (DPS meter + triggers) in top half
# - Extra space for maps, notes, browser, Discord in bottom half
#
# On ultrawide: EQ renders 16:9 centered, sidebars get extra space

LAYOUT_NAME="Raid Solo"
LAYOUT_DESC="Single client with utilities sidebar (EQLogParser, maps)"
LAYOUT_INSTANCES=1

# Wine desktop tiling
TILE_1_X=0    TILE_1_Y=0    TILE_1_W=70   TILE_1_H=100   # EQ main

# External utility windows (launched separately)
UTIL_1_X=70   UTIL_1_Y=0    UTIL_1_W=30   UTIL_1_H=50    # EQLogParser
UTIL_2_X=70   UTIL_2_Y=50   UTIL_2_W=30   UTIL_2_H=50    # Free space

# EQ internal UI — optimized for raiding
MAIN_CHAT_X=0     MAIN_CHAT_Y=72    MAIN_CHAT_W=40    MAIN_CHAT_H=28
MAIN_TARGET_X=35  MAIN_TARGET_Y=0   MAIN_TARGET_W=20  MAIN_TARGET_H=8
MAIN_PLAYER_X=80  MAIN_PLAYER_Y=30  MAIN_PLAYER_W=20  MAIN_PLAYER_H=12
MAIN_GROUP_X=80   MAIN_GROUP_Y=42   MAIN_GROUP_W=20   MAIN_GROUP_H=30
MAIN_HOTBAR_X=0   MAIN_HOTBAR_Y=95  MAIN_HOTBAR_W=60  MAIN_HOTBAR_H=5
MAIN_BUFFS_X=80   MAIN_BUFFS_Y=0    MAIN_BUFFS_W=20   MAIN_BUFFS_H=25
MAIN_EXT_TARGET_X=80 MAIN_EXT_TARGET_Y=72 MAIN_EXT_TARGET_W=20 MAIN_EXT_TARGET_H=28

VIEWPORT_MODE=auto
